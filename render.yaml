services:
  - type: web
    name: wedding-wonder-backend-prod
    runtime: python
    plan: free
    rootDir: wedding-planner-backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT "src.main:create_app()"
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: wedding-wonder-db-prod
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: AUTO_CREATE_DB
        value: "false"
      - key: FRONTEND_URL
        sync: false
      - key: VERCEL_URL
        sync: false
      - key: CORS_EXTRA_ORIGINS
        sync: false
      - key: MAX_UPLOAD_MB
        value: "25"

  - type: web
    name: wedding-wonder-backend-dev
    runtime: python
    plan: free
    rootDir: wedding-planner-backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT "src.main:create_app()"
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: wedding-wonder-db-dev
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: development
      - key: AUTO_CREATE_DB
        value: "true"
      - key: FRONTEND_URL
        sync: false
      - key: VERCEL_URL
        sync: false
      - key: CORS_EXTRA_ORIGINS
        sync: false
      - key: MAX_UPLOAD_MB
        value: "25"

databases:
  - name: wedding-wonder-db-prod
    plan: free
    databaseName: wedding_wonder_prod
    user: wedding_wonder_prod_user

  - name: wedding-wonder-db-dev
    plan: free
    databaseName: wedding_wonder_dev
    user: wedding_wonder_dev_user

