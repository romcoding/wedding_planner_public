databases:
  - name: wedding-planner-db-prod
    databaseName: wedding_planner_prod
    user: wedding_planner_prod_user
    plan: free

  - name: wedding-planner-db-dev
    databaseName: wedding_planner_dev
    user: wedding_planner_dev_user
    plan: free

services:
  - type: web
    name: wedding-planner-backend-prod
    env: python
    plan: free
    rootDir: wedding-planner-backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT "src.main:create_app()"
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wedding-planner-db-prod
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: VERCEL_URL
        sync: false
      - key: CORS_EXTRA_ORIGINS
        sync: false
      - key: MAX_UPLOAD_MB
        value: "25"

  - type: web
    name: wedding-planner-backend-dev
    env: python
    plan: free
    rootDir: wedding-planner-backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT "src.main:create_app()"
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wedding-planner-db-dev
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: development
      - key: FRONTEND_URL
        sync: false
      - key: VERCEL_URL
        sync: false
      - key: CORS_EXTRA_ORIGINS
        sync: false
      - key: MAX_UPLOAD_MB
        value: "25"

